services:
  - type: web
    name: sustainable-catalyst-research-librarian-ai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: SC_RL_ENVIRONMENT
        value: production
      - key: SC_RL_AI_PROVIDER
        value: gemini
      - key: SC_RL_GEMINI_MODEL
        value: gemini-3.5-flash
      - key: SC_RL_GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: SC_RL_SEMANTIC_ENABLED
        value: "true"
      - key: SC_RL_SEMANTIC_QUERY_EMBEDDINGS
        value: "true"
      - key: SC_RL_CHUNK_MAX_WORDS
        value: "220"
      - key: SC_RL_CHUNK_OVERLAP_WORDS
        value: "35"
      - key: SC_RL_EMBEDDING_BATCH_LIMIT
        value: "20"
      - key: SC_RL_CITATION_REQUIRED
        value: "true"
      - key: SC_RL_MAX_RUNTIME_SNAPSHOTS
        value: "5"
      - key: SC_RL_STARTUP_WARMUP_SECONDS
        value: "12"
      - key: SC_RL_STALLED_JOB_SECONDS
        value: "1800"
      - key: SC_RL_MAX_REJECTION_DETAILS
        value: "100"
      - key: SC_RL_RELEASE_VERSION
        value: "6.6.1"
      - key: SC_RL_HANDOFF_SOURCE_LIMIT
        value: "8"
      - key: SC_RL_HANDOFF_TTL_SECONDS
        value: "1800"
      - key: SC_RL_HANDOFF_RETRY_LIMIT
        value: "5"
      - key: SC_RL_HANDOFF_RETRY_BASE_SECONDS
        value: "30"
      - key: SC_RL_HANDOFF_EVENT_TTL_SECONDS
        value: "86400"
      - key: SC_RL_HANDOFF_MAX_ARTIFACT_BYTES
        value: "1048576"
      - key: SC_RL_WORKBENCH_ENABLED
        value: "true"
      - key: SC_RL_WORKBENCH_URL
        value: https://sustainablecatalyst.com/modeling-analytics/workbench/
      - key: SC_RL_DECISION_STUDIO_ENABLED
        value: "true"
      - key: SC_RL_DECISION_STUDIO_URL
        value: https://sustainablecatalyst.com/platform/decision-studio/
      - key: SC_RL_SITE_INTELLIGENCE_ENABLED
        value: "true"
      - key: SC_RL_SITE_INTELLIGENCE_URL
        value: https://sustainablecatalyst.com/platform/site-intelligence/
      - key: SC_RL_LAB_ENABLED
        value: "true"
      - key: SC_RL_LAB_URL
        value: https://sustainablecatalyst.com/lab/
      - key: SC_RL_FEATURE_SUGGESTIONS_ENABLED
        value: "true"
      - key: SC_RL_FEATURE_SUGGESTIONS_URL
        value: https://sustainablecatalyst.com/platform/feature-suggestions/
      - key: SC_RL_CORS_ORIGINS
        value: https://sustainablecatalyst.com
      - key: SC_RL_BACKEND_API_KEY
        generateValue: true
      - key: SC_RL_GEMINI_API_KEY
        sync: false
